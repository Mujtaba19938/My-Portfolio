<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="500x500" href="images/029845.png">
    <link rel="stylesheet" href="ContactUs.css">
    <title>ContactUs</title>
</head>
<body>
<div class="container">
    <h2>Get In Touch!</h2>
    <p style="text-align: center; color: rgba(255, 255, 255, 0.7);">Contact us for a quote, help, or to join the team.
    </p>
    <div class="contact-wrapper">
        <div class="contact-form">
            <form>
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Your Subject" required>
                </div>
                <div class="form-group">
                    <textarea placeholder="Your Message" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
        <div class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12667.990044377067!2d-122.41941506584091!3d37.77492954843856!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808c2d1ba945%3A0xa3fbe4d2e9b46a99!2sSan%20Francisco%2C%20CA%2C%20USA!5e0!3m2!1sen!2s!4v1616594417684!5m2!1sen!2s"
                allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>
    <div class="contact-info">
        <div>
            <i class="fas fa-map-marker-alt"></i>
            <p>2575 Lynn Ogden Lane, Beaumont</p>
        </div>
        <div>
            <i class="fas fa-envelope"></i>
            <p>Email: programminginsider2021@gmail.com</p>
        </div>
        <div>
            <i class="fas fa-phone"></i>
            <p>Phone: +1 234 567 890</p>
        </div>
    </div>
</div>
</div>
</body>
</html>
